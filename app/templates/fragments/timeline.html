<!-- fragment: timeline (content + scripts only, styles are in app.css) -->
<div class="page-timeline">

<!-- Legend — Nodes -->
<div class="legend-bar">
    <span class="legend-item"><span class="legend-dot" style="background:#4f7cff"></span> 根事件</span>
    <span class="legend-item"><span class="legend-dot" style="background:#7c5cfc"></span> 衍生事件</span>
    <span class="legend-item"><span class="legend-dot" style="background:#d4913e"></span> 预测</span>
    <span class="legend-item"><span class="legend-dot" style="background:#0ea57a"></span> 市场反应</span>
    <span class="legend-item"><span class="legend-dot" style="background:#d9485e"></span> 证伪</span>
</div>
<!-- Legend — Edges -->
<div class="legend-bar">
    <span class="legend-item"><span style="display:inline-block;width:20px;border-top:2px solid #5c677d;vertical-align:middle;margin-right:4px"></span> 推断关联</span>
    <span class="legend-item"><span style="display:inline-block;width:20px;border-top:2px solid #22c55e;vertical-align:middle;margin-right:4px"></span> 已验证因果</span>
    <span class="legend-item"><span style="display:inline-block;width:20px;border-top:2px dashed #ef4444;vertical-align:middle;margin-right:4px"></span> 已证伪</span>
</div>

<!-- Main Layout: Graph + Isolated Sidebar -->
<div class="timeline-layout" id="timelineLayout">
    <div class="timeline-graph-area" id="timelineGraphArea">
        <div id="timelineGraph">
            <div class="text-center py-5 text-muted">
                <div class="spinner-border"></div>
                <p class="mt-2">加载时间线...</p>
            </div>
        </div>
        <button class="isolated-expand-float" id="isolatedExpandFloat" title="展开孤立事件侧边栏" onclick="toggleIsolatedSidebar()" style="display:none">◀</button>
    </div>

    <div class="isolated-sidebar" id="isolatedSidebar">
        <div class="isolated-sidebar-header">
            <span class="isolated-sidebar-title">📋 孤立事件 <small class="isolated-count" id="isolatedCount"></small></span>
            <button class="isolated-toggle-btn" id="toggleSidebarBtn" title="收起侧边栏" onclick="toggleIsolatedSidebar()">◀</button>
        </div>
        <div class="isolated-filters">
            <input type="text" class="isolated-search" id="isolatedSearch" placeholder="搜索事件标题...">
            <select class="isolated-type-select" id="isolatedTypeFilter">
                <option value="">全部类型</option>
                <option value="root_event">🔵 根事件</option>
                <option value="derived_event">🟣 衍生事件</option>
                <option value="prediction">🟠 预测</option>
                <option value="market_reaction">🟢 市场反应</option>
                <option value="verification">🔴 证伪</option>
            </select>
        </div>
        <div class="isolated-list" id="isolatedList">
            <div class="isolated-list-empty">加载中...</div>
        </div>
    </div>
</div>

</div>

<script>
// ── Timeline JS (abbreviated from full template — core graph rendering + detail overlay) ──
var graphChart = null;
var _loadGraphTimer = null;
var _loadGraphAbort = null;
var _isDetailOpen = false;
var _activeNodeId = null;
var _activeNodeData = null;
var _capturedNode = null;
var _escHandler = null;
var _animToken = 0;
var _isolatedFilterTimer = null;
var _sidebarCollapsed = false;

function _animDelay(ms, token) {
    return new Promise(function(resolve, reject) {
        setTimeout(function() {
            if (_animToken !== token) reject(new Error('Animation cancelled'));
            else resolve();
        }, ms);
    });
}

function tc(lightColor, darkColor) {
    return document.documentElement.hasAttribute('data-theme') ? lightColor : darkColor;
}

window.addEventListener('themechange', function() {
    if (graphChart && !graphChart.isDisposed()) { loadGraph(); }
});

var nodeTypeLabel = {root_event:'根事件',derived_event:'衍生事件',prediction:'预测',market_reaction:'市场反应',verification:'证伪'};
var statusLabelMap = {confirmed:'已确认',predicted:'预测中',pending:'待验证',refuted:'已证伪'};
var nodeColorMap = {root_event:'#4f7cff',derived_event:'#7c5cfc',prediction:'#d4913e',market_reaction:'#0ea57a',verification:'#d9485e'};
var isoColorMap = {root_event:'#4f7cff',derived_event:'#7c5cfc',prediction:'#d4913e',market_reaction:'#0ea57a',verification:'#d9485e'};

{% if initial_graph and initial_graph.nodes %}
var INITIAL_GRAPH = {{ initial_graph | tojson | safe }};
{% else %}
var INITIAL_GRAPH = null;
{% endif %}

document.addEventListener('DOMContentLoaded', () => {
    if (INITIAL_GRAPH && INITIAL_GRAPH.nodes && INITIAL_GRAPH.nodes.length) {
        renderGraph(INITIAL_GRAPH);
    } else {
        loadGraph();
    }
});

// If DOM already ready (SPA injection), fire immediately
// Override renderGraph to also load isolated nodes (must be BEFORE initial render)
var _origRenderGraph = renderGraph;
renderGraph = function(graph) { _origRenderGraph(graph); setTimeout(loadIsolatedNodes, 100); };

if (document.readyState !== 'loading') {
    if (INITIAL_GRAPH && INITIAL_GRAPH.nodes && INITIAL_GRAPH.nodes.length) {
        renderGraph(INITIAL_GRAPH);
    } else {
        loadGraph();
    }
}

function loadGraph() {
    if (_loadGraphTimer) clearTimeout(_loadGraphTimer);
    _loadGraphTimer = setTimeout(_doLoadGraph, 150);
}

async function _doLoadGraph() {
    const daysEl = document.getElementById('daysFilter');
    const days = daysEl ? daysEl.value : '90';
    const dom = document.getElementById('timelineGraph');

    if (_loadGraphAbort) _loadGraphAbort.abort();
    _loadGraphAbort = new AbortController();

    if (graphChart && !graphChart.isDisposed()) {
        var oldWrapper = document.getElementById('echartsWrapper');
        ChartResizeManager.dispose(graphChart, oldWrapper);
        graphChart = null;
    }

    try {
        const expiredEl = document.getElementById('expiredToggle');
        const includeExpired = expiredEl && expiredEl.checked ? '1' : '0';
        const resp = await fetch(
            `/api/v1/timeline/graph?days=${days}&include_expired=${includeExpired}`,
            { signal: _loadGraphAbort.signal }
        );
        const data = await resp.json();

        if (!data.success || !data.data.nodes.length) {
            dom.innerHTML = `<div class="text-center py-5 text-muted">
                <i class="bi bi-diagram-3 display-1 d-block mb-2"></i>
                <h5>暂无时间线数据</h5>
                <p>当事件管道处理后，Bubble将自动构建</p>
                <small>节点: ${data.data?.nodes?.length || 0} | 边: ${data.data?.edges?.length || 0}</small>
            </div>`;
            return;
        }

        renderGraph(data.data);
    } catch(e) {
        if (e.name === 'AbortError') return;
        dom.innerHTML = `<div class="alert alert-danger m-3">加载失败: ${e.message}</div>`;
    }
}

function renderGraph(graph) {
    const container = document.getElementById('timelineGraph');
    container.innerHTML = '';

    const wrapper = document.createElement('div');
    wrapper.className = 'echarts-wrapper';
    wrapper.id = 'echartsWrapper';
    container.appendChild(wrapper);

    const hint = document.createElement('div');
    hint.className = 'graph-hint';
    hint.textContent = '点击节点查看事件详情';
    container.appendChild(hint);

    if (graphChart) ChartResizeManager.dispose(graphChart, wrapper);
    graphChart = echarts.init(wrapper);

    function glassGradient(highlight, body, edge, rim) {
        return {
            type: 'radial', x: 0.30, y: 0.24, r: 0.68,
            colorStops: [
                {offset: 0, color: highlight},
                {offset: 0.12, color: body},
                {offset: 0.50, color: edge},
                {offset: 1, color: rim}
            ]
        };
    }

    var TYPE_COLORS = {
        root_event: {bg: '#4f7cff', border: 'rgba(160,195,255,0.35)',
            gradient: glassGradient('rgba(220,240,255,0.72)','rgba(79,124,255,0.28)','rgba(35,60,160,0.30)','rgba(90,140,255,0.10)'),
            glow: 'rgba(79,124,255,0.18)'},
        derived_event: {bg: '#7c5cfc', border: 'rgba(170,150,255,0.32)',
            gradient: glassGradient('rgba(225,210,255,0.68)','rgba(124,92,252,0.26)','rgba(55,38,155,0.28)','rgba(140,110,255,0.08)'),
            glow: 'rgba(124,92,252,0.16)'},
        prediction: {bg: '#d4913e', border: 'rgba(240,180,90,0.32)',
            gradient: glassGradient('rgba(255,240,200,0.68)','rgba(212,145,62,0.26)','rgba(130,80,22,0.28)','rgba(225,160,70,0.08)'),
            glow: 'rgba(212,145,62,0.16)'},
        market_reaction: {bg: '#0ea57a', border: 'rgba(60,210,160,0.30)',
            gradient: glassGradient('rgba(200,252,230,0.65)','rgba(14,165,122,0.25)','rgba(4,85,60,0.28)','rgba(35,190,140,0.08)'),
            glow: 'rgba(14,165,122,0.15)'},
        verification: {bg: '#d9485e', border: 'rgba(240,120,135,0.30)',
            gradient: glassGradient('rgba(255,215,220,0.65)','rgba(217,72,94,0.26)','rgba(130,28,38,0.28)','rgba(230,95,115,0.08)'),
            glow: 'rgba(217,72,94,0.15)'},
    };
    const categories = [
        {name: 'root_event', itemStyle: {color: TYPE_COLORS.root_event.bg}},
        {name: 'derived_event', itemStyle: {color: TYPE_COLORS.derived_event.bg}},
        {name: 'prediction', itemStyle: {color: TYPE_COLORS.prediction.bg}},
        {name: 'market_reaction', itemStyle: {color: TYPE_COLORS.market_reaction.bg}},
        {name: 'verification', itemStyle: {color: TYPE_COLORS.verification.bg}},
    ];

    const nodes = graph.nodes.map(n => {
        const typeCfg = TYPE_COLORS[n.node_type] || TYPE_COLORS.derived_event;
        const catIdx = categories.findIndex(c => c.name === n.node_type);
        return {
            ...n, id: n.id, name: n.label, category: catIdx >= 0 ? catIdx : 1,
            symbolSize: 24 + (n.confidence || 0.5) * 26,
            itemStyle: {
                color: typeCfg.gradient || typeCfg.bg,
                borderColor: typeCfg.border, borderWidth: 0.8,
                shadowBlur: 10, shadowColor: typeCfg.glow,
                opacity: n.is_expired ? 0.35 : 1.0,
            },
            label: {show: true, fontSize: 10, color: tc('#4a5568', '#b0b8c4')},
        };
    });

    const edges = graph.edges.map(function(e) {
        return {
            source: e.from, target: e.to,
            _edgeLabel: e.label || e.relation_type || '',
            _edgeTitle: e.title || '', value: e.value,
            lineStyle: {
                color: e.color?.color || '#4a5568',
                type: e.dashes ? 'dashed' : 'solid',
                width: Math.max(0.6, (e.value || 0.5) * 2.5),
                opacity: 0.6,
            },
        };
    });

    graphChart.setOption({
        tooltip: {
            formatter: function(p) {
                if (p.dataType === 'node') {
                    return '<b>' + (p.data.name||'') + '</b><br>类型: ' + (p.data.node_type||'') + '<br>状态: ' + (p.data.status||'') + '<br>置信度: ' + (((p.data.confidence || 0.5) * 100).toFixed(0)) + '%';
                } else {
                    return '<b>' + (p.data._edgeLabel||'influences') + '</b><br>强度: ' + ((p.data.value||0).toFixed(2)) + (p.data._edgeTitle ? '<br>' + p.data._edgeTitle : '');
                }
            }
        },
        legend: [{ data: categories.map(c => c.name), orient: 'vertical', left: 10, top: 10, textStyle: {fontSize: 10} }],
        series: [{
            type: 'graph', layout: 'force', data: nodes, links: edges, categories: categories,
            roam: true, draggable: true,
            force: { initIterations: 12, repulsion: 300, gravity: 0.1, edgeLength: [100, 250], friction: 0.2, layoutAnimation: true },
            scaleLimit: {min: 0.3, max: 5},
            emphasis: {
                focus: 'adjacency', scale: 1.6,
                lineStyle: {width: 2.5, opacity: 0.7},
                label: {fontSize: 13, fontWeight: 'bold'},
                itemStyle: { shadowBlur: 22, shadowColor: 'rgba(212,168,83,0.30)', borderColor: tc('rgba(0,0,0,0.25)', 'rgba(255,255,255,0.35)'), borderWidth: 1.4 },
            },
        }],
    });

    _isDetailOpen = false; _activeNodeId = null; _activeNodeData = null; _capturedNode = null;

    graphChart.on('click', function(params) {
        if (params.dataType !== 'node' || _isDetailOpen || !params.data || !params.data.id) return;
        var nodeId = params.data.id;
        _activeNodeId = nodeId; _activeNodeData = params.data;

        var ox = '50%', oy = '50%';
        try {
            var layout = graphChart.getModel().getSeriesByIndex(0).getData().getItemLayout(params.dataIndex);
            if (layout && isFinite(layout.x) && isFinite(layout.y)) {
                var pt = graphChart.convertToPixel({seriesIndex: 0}, [layout.x, layout.y]);
                if (pt && isFinite(pt[0]) && isFinite(pt[1])) {
                    var wr = wrapper.getBoundingClientRect();
                    if (wr.width > 0 && wr.height > 0) {
                        ox = ((pt[0] / wr.width) * 100).toFixed(1) + '%';
                        oy = ((pt[1] / wr.height) * 100).toFixed(1) + '%';
                    }
                }
            }
        } catch(e) {}

        _capturedNode = { originX: ox, originY: oy };
        graphChart.setOption({ series: [{ force: { layoutAnimation: false } }] });
        var hintEl = container.querySelector('.graph-hint');
        if (hintEl) hintEl.style.opacity = '0';
        wrapper.style.transformOrigin = ox + ' ' + oy;
        wrapper.style.transform = 'scale(2.8)';
        buildDetailOverlay(container, nodeId, _activeNodeData);
        var overlay = document.getElementById('nodeDetailFullscreen');
        if (overlay) {
            overlay.style.display = 'block'; overlay.style.opacity = '0'; overlay.style.transition = 'opacity 0.35s ease';
            var content = overlay.querySelector('.detail-content');
            if (content) { content.style.transition = 'transform 0.45s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.4s ease'; content.style.transform = 'scale(0.92)'; content.style.opacity = '0'; }
        }

        var animToken = ++_animToken;
        (async function() {
            try {
                await _animDelay(200, animToken);
                if (overlay) { overlay.style.opacity = '1'; }
                var c2 = overlay && overlay.querySelector('.detail-content');
                if (c2) { c2.style.transform = 'scale(1)'; c2.style.opacity = '1'; }
                await _animDelay(500, animToken);
                _isDetailOpen = true;
            } catch(e) {}
        })();
    });

    ChartResizeManager.observe(graphChart, wrapper);
}

// ── Build Detail Overlay ───────────────────────────────────────────
function buildDetailOverlay(container, nodeId, nodeData) {
    var existing = document.getElementById('nodeDetailFullscreen');
    if (existing) existing.remove();

    var overlay = document.createElement('div');
    overlay.id = 'nodeDetailFullscreen';
    overlay.style.display = 'none';

    var closeBtn = document.createElement('button');
    closeBtn.className = 'detail-close-btn';
    closeBtn.innerHTML = '&times;';
    closeBtn.title = '退出详情 (Esc)';
    closeBtn.onclick = function() { exitDetailMode(container); };
    overlay.appendChild(closeBtn);

    var content = document.createElement('div');
    content.className = 'detail-content';

    var nodeColor = nodeColorMap[nodeData.node_type] || '#6b7280';
    var nodeTitle = nodeData.name || '';
    var nodeConf = ((nodeData.confidence || 0.5) * 100).toFixed(0);
    var typeStr = nodeTypeLabel[nodeData.node_type] || nodeData.node_type || '';
    var statusStr = statusLabelMap[nodeData.status] || nodeData.status || '';
    var statusClass = nodeData.status || 'pending';

    var heroHtml = '';
    heroHtml += '<div class="detail-hero">';
    heroHtml += '<div class="node-icon" style="background:radial-gradient(circle at 32% 28%, rgba(255,255,255,0.18) 0%, ' + nodeColor + ' 30%, rgba(0,0,0,0.18) 100%); box-shadow:0 0 12px ' + nodeColor + '22, inset 0 0.5px 1px rgba(255,255,255,0.08);"></div>';
    heroHtml += '<div class="node-title">' + escHtml(nodeTitle) + '</div>';
    heroHtml += '<div class="node-subtitle">' + typeStr + ' · ' + statusStr + ' · 置信度 ' + nodeConf + '%</div>';
    heroHtml += '</div>';
    heroHtml += '<div class="detail-meta-bar">';
    heroHtml += '<span class="detail-meta-pill ' + statusClass + '">' + (statusLabelMap[nodeData.status] || nodeData.status) + '</span>';
    heroHtml += '<span class="detail-meta-pill">置信度 ' + nodeConf + '%</span>';
    if (nodeData.tags && nodeData.tags.length) {
        heroHtml += '<span class="detail-meta-pill">' + nodeData.tags.length + ' 个标签</span>';
    }
    var expiresAt = nodeData.expires_at;
    if (expiresAt) {
        var expDate = new Date(expiresAt), now = new Date();
        var isExpired = expDate < now;
        var daysLeft = Math.ceil((expDate - now) / (1000 * 60 * 60 * 24));
        heroHtml += '<span class="detail-meta-pill ' + (isExpired?'refuted':'pending') + '">⏳ ' + (isExpired ? '已过期 ' + Math.abs(daysLeft) + ' 天' : '剩余 ' + daysLeft + ' 天') + '</span>';
    }
    heroHtml += '</div>';
    content.innerHTML = heroHtml;

    var desc = nodeData.description || '';
    if (desc) {
        content.innerHTML += '<div class="detail-section"><div class="detail-section-title">📋 事件描述</div><div class="detail-desc">' + escHtml(desc) + '</div></div>';
    }

    var tags = nodeData.tags || [];
    if (tags.length) {
        var tagsHtml = '<div class="detail-section"><div class="detail-section-title">🏷 标签</div><div class="detail-tags">';
        tags.forEach(function(t) { tagsHtml += '<span class="detail-tag">' + escHtml(t) + '</span>'; });
        tagsHtml += '</div></div>';
        content.innerHTML += tagsHtml;
    }

    content.innerHTML += '<div id="detailApiSection" class="detail-loading"><div class="spinner-border spinner-border-sm mb-2"></div><div>加载因果链数据...</div></div>';
    content.innerHTML += '<button class="btn-extend" onclick="event.stopPropagation();extendNode(\'' + nodeId + '\')">🔮 基于此事件延伸预测 · 仅供参考</button>';
    content.innerHTML += '<button class="btn-delete" onclick="event.stopPropagation();deleteNode(\'' + nodeId + '\')">🗑️ 删除此节点及关联边</button>';

    overlay.appendChild(content);
    container.appendChild(overlay);

    var fetchController = new AbortController();
    var fetchTimeout = setTimeout(function() { fetchController.abort(); }, 10000);

    Promise.all([
        fetch('/api/v1/timeline/nodes/' + nodeId, { signal: fetchController.signal }).then(function(r) { return r.json(); }),
        fetch('/api/v1/timeline/edges/' + nodeId, { signal: fetchController.signal }).then(function(r) { return r.json(); }),
    ]).then(function(_ref) {
        clearTimeout(fetchTimeout);
        var nodeResp = _ref[0], edgeResp = _ref[1];
        if (!document.getElementById('nodeDetailFullscreen')) return;

        var apiHtml = '';
        if (nodeResp && nodeResp.success && nodeResp.data && nodeResp.data.upstream && nodeResp.data.upstream.length) {
            apiHtml += '<div class="detail-section"><div class="detail-section-title">← 上游原因</div>';
            nodeResp.data.upstream.forEach(function(n) {
                apiHtml += '<div class="detail-relation-row"><span class="detail-relation-dot" style="background:#4f7cff"></span><span style="flex:1">' + escHtml(n.title) + '</span><span class="badge bg-secondary" style="font-size:0.6rem">' + escHtml(statusLabelMap[n.status] || n.status || '') + '</span></div>';
            });
            apiHtml += '</div>';
        }
        if (nodeResp && nodeResp.success && nodeResp.data && nodeResp.data.downstream && nodeResp.data.downstream.length) {
            apiHtml += '<div class="detail-section"><div class="detail-section-title">→ 下游影响</div>';
            nodeResp.data.downstream.forEach(function(n) {
                apiHtml += '<div class="detail-relation-row"><span class="detail-relation-dot" style="background:#d4913e"></span><span style="flex:1">' + escHtml(n.title) + '</span><span class="badge bg-secondary" style="font-size:0.6rem">' + escHtml(statusLabelMap[n.status] || n.status || '') + '</span></div>';
            });
            apiHtml += '</div>';
        }
        if (edgeResp && edgeResp.success && edgeResp.data) {
            var allEdges = [].concat((edgeResp.data.outgoing||[]).map(function(e){e._dir='out';return e;}), (edgeResp.data.incoming||[]).map(function(e){e._dir='in';return e;}));
            if (allEdges.length) {
                apiHtml += '<div class="detail-section"><div class="detail-section-title">🔗 因果链</div>';
                allEdges.forEach(function(e) {
                    var v = e.verified;
                    var icon = v === true ? '✅' : v === false ? '❌' : '🔮';
                    var label = v === true ? '已验证因果' : v === false ? '已证伪' : '推断关联';
                    var dotColor = v === true ? '#22c55e' : v === false ? '#ef4444' : '#5c677d';
                    apiHtml += '<div class="detail-edge-card">';
                    apiHtml += '<div class="edge-top"><span style="color:' + dotColor + ';font-size:0.85rem">' + icon + '</span><em style="color:' + tc('#334155','#cbd5e1') + ';font-weight:600">' + escHtml(e.relation_type || 'influences') + '</em><span style="font-size:0.65rem;color:' + dotColor + ';padding:1px 8px;border-radius:99px;border:1px solid ' + dotColor + '33;background:' + dotColor + '0d">' + label + '</span><span style="font-size:0.62rem;color:' + tc('#64748b','#5c677d') + ';margin-left:auto">强度 ' + ((e.strength||0)*100).toFixed(1) + '%</span></div>';
                    if (e.logic_chain) apiHtml += '<div class="edge-reason">' + escHtml(e.logic_chain) + '</div>';
                    apiHtml += '<div class="edge-actions">';
                    apiHtml += '<button class="edge-btn confirm" onclick="event.stopPropagation();verifyEdge(\'' + e.id + '\',true)">✅ 确认</button>';
                    apiHtml += '<button class="edge-btn refute" onclick="event.stopPropagation();verifyEdge(\'' + e.id + '\',false)">❌ 证伪</button>';
                    apiHtml += '<button class="edge-btn reset" onclick="event.stopPropagation();verifyEdge(\'' + e.id + '\',null)">↩ 重置</button>';
                    apiHtml += '</div></div>';
                });
                apiHtml += '</div>';
            }
        }
        if (!apiHtml) apiHtml = '<div style="text-align:center;color:' + tc('#64748b','#5c677d') + ';padding:24px;font-size:0.82rem">暂无因果链数据<br><span style="font-size:0.68rem">点击下方 🔮 延伸预测 探索可能的发展</span></div>';

        var apiSection = document.getElementById('detailApiSection');
        if (apiSection) apiSection.outerHTML = apiHtml;
    }).catch(function(e) {
        clearTimeout(fetchTimeout);
        var apiSection = document.getElementById('detailApiSection');
        if (apiSection) apiSection.outerHTML = '<div style="color:var(--text-muted);font-size:0.78rem;text-align:center;padding:24px">' + (e.name === 'AbortError' ? '请求超时' : '加载失败: ' + escHtml(e.message||'')) + '</div>';
    });

    if (_escHandler) document.removeEventListener('keydown', _escHandler);
    _escHandler = function(ev) { if (ev.key === 'Escape') exitDetailMode(container); };
    document.addEventListener('keydown', _escHandler);
}

function exitDetailMode(container) {
    if (_escHandler) { document.removeEventListener('keydown', _escHandler); _escHandler = null; }
    var overlay = document.getElementById('nodeDetailFullscreen');
    if (!overlay) return;
    _isDetailOpen = false; _activeNodeId = null; _activeNodeData = null;

    var content = overlay.querySelector('.detail-content');
    if (content) { content.style.transition = 'transform 0.2s ease, opacity 0.2s ease'; content.style.transform = 'scale(0.95)'; content.style.opacity = '0'; }
    overlay.style.opacity = '0'; overlay.style.transition = 'opacity 0.25s ease';

    var exitToken = ++_animToken;
    setTimeout(function() {
        if (_animToken !== exitToken) return;
        if (overlay.parentNode) overlay.parentNode.removeChild(overlay);
    }, 280);

    var wrapper = document.getElementById('echartsWrapper');
    if (wrapper) { wrapper.style.transformOrigin = 'center center'; wrapper.style.transform = 'scale(1)'; }
    _capturedNode = null;

    setTimeout(function() {
        if (_animToken !== exitToken) return;
        if (graphChart && !graphChart.isDisposed()) { graphChart.setOption({ series: [{ force: { layoutAnimation: true } }] }); }
        var hint = container.querySelector('.graph-hint');
        if (hint) hint.style.opacity = '1';
    }, 900);
}

function escHtml(s) { var d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }

var _actionLocks = {};
function _lock(key) { _actionLocks[key] = true; }
function _unlock(key) { delete _actionLocks[key]; }
function _isLocked(key) { return !!_actionLocks[key]; }

async function verifyEdge(edgeId, status) {
    var lockKey = 'verify-' + edgeId;
    if (_isLocked(lockKey)) return;
    _lock(lockKey);
    var card = document.querySelector('.detail-edge-card [onclick*="' + edgeId + '"]');
    var btns = card ? card.closest('.detail-edge-card').querySelectorAll('.edge-btn') : [];
    btns.forEach(function(b) { b.disabled = true; });
    try {
        const resp = await fetch('/api/v1/timeline/edges/' + edgeId + '/verify', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({verified: status}) });
        const data = await resp.json();
        if (data.success) {
            showNotification(status === true ? '已确认因果 ✅' : status === false ? '已证伪 ❌' : '重置为推断 🔮', 'success');
            setTimeout(function() { loadGraph(); }, 300);
        } else {
            showNotification('操作失败: ' + (data.error || '未知错误'), 'danger');
            btns.forEach(function(b) { b.disabled = false; });
        }
    } catch(e) { showNotification('请求失败: ' + e.message, 'danger'); btns.forEach(function(b) { b.disabled = false; }); }
    finally { _unlock(lockKey); }
}

async function extendNode(nodeId) {
    var lockKey = 'extend-' + nodeId;
    if (_isLocked(lockKey)) return;
    _lock(lockKey);
    var btn = document.querySelector('.btn-extend');
    if (btn) { btn.disabled = true; btn.textContent = '⏳ 正在生成预测...'; }
    showNotification('正在生成预测...', 'info');
    try {
        const resp = await fetch('/api/v1/timeline/extend/' + nodeId, {method:'POST'});
        const data = await resp.json();
        if (data.success) { showNotification('已生成 ' + data.data.predictions + ' 个预测节点', 'success'); setTimeout(function() { loadGraph(); }, 500); }
        else { showNotification('延伸失败: ' + (data.error || ''), 'danger'); if (btn) { btn.disabled = false; btn.textContent = '🔮 基于此事件延伸预测 · 仅供参考'; } }
    } catch(e) { showNotification('请求失败: ' + e.message, 'danger'); if (btn) { btn.disabled = false; btn.textContent = '🔮 基于此事件延伸预测 · 仅供参考'; } }
    finally { _unlock(lockKey); }
}

async function deleteNode(nodeId) {
    var lockKey = 'delete-' + nodeId;
    if (_isLocked(lockKey)) return;
    if (!confirm('确认删除此节点？\n\n所有关联的因果边将被一并删除，此操作不可撤销。')) return;
    _lock(lockKey);
    var btn = document.querySelector('.btn-delete');
    if (btn) { btn.disabled = true; btn.textContent = '⏳ 正在删除...'; }
    try {
        const resp = await fetch('/api/v1/timeline/nodes/' + nodeId, { method: 'DELETE' });
        const data = await resp.json();
        if (data.success) {
            showNotification('节点已删除', 'success');
            var container = document.getElementById('timelineGraph');
            if (container && typeof exitDetailMode === 'function') exitDetailMode(container);
            setTimeout(function() { loadGraph(); }, 400);
        } else { showNotification('删除失败: ' + (data.error || '未知错误'), 'danger'); if (btn) { btn.disabled = false; btn.textContent = '🗑️ 删除此节点及关联边'; } }
    } catch(e) { showNotification('请求失败: ' + e.message, 'danger'); if (btn) { btn.disabled = false; btn.textContent = '🗑️ 删除此节点及关联边'; } }
    finally { _unlock(lockKey); }
}

async function rebuildTimeline() {
    if (!confirm('确认重建全部时间线？\n\n这将清空所有节点和因果边，然后从 EventCard 重新构建（S 级事件优先）。\n\n此操作不可撤销。')) return;
    var btn = event.target;
    btn.disabled = true; btn.textContent = '⏳ 重建中...';
    showNotification('正在重建时间线...', 'info');
    try {
        const resp = await fetch('/api/v1/timeline/rebuild', { method: 'POST' });
        const data = await resp.json();
        if (data.success) {
            var r = data.data;
            showNotification('重建完成: ' + r.nodes_created + ' 节点, ' + r.edges_created + ' 边, ' + r.predictions_created + ' 预测', 'success');
            setTimeout(function() { loadGraph(); }, 500);
        } else { showNotification('重建失败: ' + (data.error || '未知错误'), 'danger'); btn.disabled = false; btn.textContent = '🔧 重建'; }
    } catch(e) { showNotification('请求失败: ' + e.message, 'danger'); btn.disabled = false; btn.textContent = '🔧 重建'; }
}

// ── Isolated Events Sidebar ─────────────────────────────────────────
function toggleIsolatedSidebar() {
    _sidebarCollapsed = !_sidebarCollapsed;
    var sidebar = document.getElementById('isolatedSidebar');
    var btn = document.getElementById('toggleSidebarBtn');
    var expandFloat = document.getElementById('isolatedExpandFloat');
    if (sidebar) sidebar.classList.toggle('collapsed', _sidebarCollapsed);
    if (btn) { btn.textContent = _sidebarCollapsed ? '▶' : '◀'; btn.title = _sidebarCollapsed ? '展开侧边栏' : '收起侧边栏'; }
    if (expandFloat) expandFloat.style.display = _sidebarCollapsed ? 'flex' : 'none';
    setTimeout(function() { if (graphChart && !graphChart.isDisposed()) { try { graphChart.resize(); } catch(e) {} } }, 350);
}

async function loadIsolatedNodes() {
    var typeFilterEl = document.getElementById('isolatedTypeFilter');
    var searchEl = document.getElementById('isolatedSearch');
    var typeFilter = typeFilterEl ? typeFilterEl.value : '';
    var search = searchEl ? searchEl.value.trim() : '';
    var expiredEl = document.getElementById('expiredToggle');
    var params = new URLSearchParams();
    if (typeFilter) params.set('type', typeFilter);
    if (search) params.set('search', search);
    params.set('limit', '200');
    params.set('include_expired', expiredEl && expiredEl.checked ? '1' : '0');

    try {
        var resp = await fetch('/api/v1/timeline/isolated?' + params.toString());
        var data = await resp.json();
        if (!data.success) return;
        var nodes = data.data.nodes;
        var total = data.data.total;
        var typeCounts = data.data.type_counts || {};
        var countEl = document.getElementById('isolatedCount');
        if (countEl) countEl.textContent = '(' + total + ')';
        // Update type filter dropdown counts
        var select = document.getElementById('isolatedTypeFilter');
        if (select && !select._counted) {
            select._counted = true;
            for (var i = 1; i < select.options.length; i++) {
                var opt = select.options[i];
                var cnt = typeCounts[opt.value] || 0;
                if (cnt > 0) opt.textContent = opt.textContent.split(' (')[0] + ' (' + cnt + ')';
            }
        }
        renderIsolatedList(nodes);
    } catch(e) {
        var list = document.getElementById('isolatedList');
        if (list) list.innerHTML = '<div class="isolated-list-empty" style="color:#ef4444">加载失败: ' + escHtml(e.message || '') + '</div>';
    }
}

function renderIsolatedList(nodes) {
    var list = document.getElementById('isolatedList');
    if (!list) return;
    if (!nodes.length) { list.innerHTML = '<div class="isolated-list-empty">暂无孤立事件</div>'; return; }
    var html = '';
    for (var i = 0; i < nodes.length; i++) {
        var n = nodes[i];
        var dotColor = isoColorMap[n.node_type] || '#6b7280';
        var typeLabel2 = nodeTypeLabel[n.node_type] || n.node_type || '';
        var confPct = ((n.confidence || 0.5) * 100).toFixed(0);
        var level = n.level || '';
        var levelHtml = level ? '<span class="isolated-item-level" data-level="' + level + '">' + level + '级</span>' : '';
        html += '<div class="isolated-item" onclick="previewIsolatedNode(\'' + n.id + '\')" title="' + escHtml(n.title || '') + '">';
        html += '<span class="isolated-item-dot" style="background:' + dotColor + '"></span>';
        html += '<div class="isolated-item-body"><div class="isolated-item-title">' + escHtml(n.title || '') + '</div><div class="isolated-item-meta"><span>' + typeLabel2 + '</span><span>' + confPct + '%</span>' + levelHtml + '</div></div></div>';
    }
    list.innerHTML = html;
}

function previewIsolatedNode(nodeId) {
    var container = document.getElementById('timelineGraph');
    if (!container) return;
    fetch('/api/v1/timeline/nodes/' + nodeId).then(function(r) { return r.json(); }).then(function(data) {
        if (!data.success || !data.data || !data.data.node) { showNotification('无法加载事件详情', 'danger'); return; }
        var nodeInfo = data.data.node;
        _activeNodeId = nodeId;
        _activeNodeData = { id: nodeId, name: nodeInfo.title, node_type: nodeInfo.node_type, status: nodeInfo.status, confidence: nodeInfo.confidence, description: nodeInfo.description, tags: nodeInfo.tags, expires_at: nodeInfo.expires_at };
        _capturedNode = { originX: '50%', originY: '50%' };
        buildDetailOverlay(container, nodeId, _activeNodeData);
        var overlay = document.getElementById('nodeDetailFullscreen');
        if (overlay) { overlay.style.display = 'block'; overlay.style.opacity = '1'; var c = overlay.querySelector('.detail-content'); if (c) { c.style.transform = 'scale(1)'; c.style.opacity = '1'; } _isDetailOpen = true; }
    }).catch(function(e) { showNotification('加载失败: ' + (e.message || ''), 'danger'); });
}

// Search/filter bindings (immediate, no DOMContentLoaded — already in SPA fragment)
(function() {
    var searchInput = document.getElementById('isolatedSearch');
    var typeSelect = document.getElementById('isolatedTypeFilter');
    if (searchInput) { searchInput.addEventListener('input', function() { if (_isolatedFilterTimer) clearTimeout(_isolatedFilterTimer); _isolatedFilterTimer = setTimeout(loadIsolatedNodes, 300); }); }
    if (typeSelect) { typeSelect.addEventListener('change', loadIsolatedNodes); }
})();

async function takeSnapshot() {
    try {
        const resp = await fetch('/api/v1/timeline/snapshot', {method:'POST'});
        const data = await resp.json();
        if (data.success) showNotification('快照已保存: ' + data.data.event_count + ' 节点, ' + data.data.edge_count + ' 边', 'success');
    } catch(e) { showNotification('快照失败', 'danger'); }
}

// Cleanup
window._pageDestroy = function() {
    if (_escHandler) { document.removeEventListener('keydown', _escHandler); _escHandler = null; }
    if (_loadGraphAbort) _loadGraphAbort.abort();
    if (_loadGraphTimer) clearTimeout(_loadGraphTimer);
    if (_isolatedFilterTimer) clearTimeout(_isolatedFilterTimer);
    if (graphChart && !graphChart.isDisposed()) {
        var wrapper = document.getElementById('echartsWrapper');
        ChartResizeManager.dispose(graphChart, wrapper);
        graphChart = null;
    }
};

// ── Expose to global scope for inline onclick (SPA IIFE-safe) ──
window.toggleIsolatedSidebar = toggleIsolatedSidebar;
window.extendNode = extendNode;
window.deleteNode = deleteNode;
window.verifyEdge = verifyEdge;
window.previewIsolatedNode = previewIsolatedNode;
window.loadIsolatedNodes = loadIsolatedNodes;
window.takeSnapshot = takeSnapshot;
</script>
